<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implantação de Pedidos · Oca Planejados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:#1A5C3A;--brand-l:#2E8B57;--brand-bg:#EAF4EE;
    --accent:#F4A724;--blue:#1B4F8A;--blue-bg:#EBF2FB;
    --purple:#6B3FA0;--purple-bg:#F3EEF9;--red:#C0392B;--red-bg:#FDECEA;
    --amber:#7B5800;--amber-bg:#FFFAED;--grey:#888780;--grey-bg:#F5F5F5;
    --text:#1C1C1C;--text-muted:#666;--border:#E0E0E0;--bg:#F8F9FA;--card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  .topbar{background:var(--brand);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .topbar-left{display:flex;align-items:center;gap:10px}
  .logo-mark{width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff}
  .topbar h1{font-size:14px;font-weight:600;color:#fff}
  .topbar p{font-size:11px;color:rgba(255,255,255,.65)}
  .sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.8);background:rgba(255,255,255,.1);padding:4px 10px;border-radius:99px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
  .sync-dot.off{background:#f87171;animation:none}
  .sync-dot.saving{background:#fbbf24;animation:blink .5s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .container{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .stat-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
  .stat-value{font-size:26px;font-weight:600}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
  .toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .search-wrap{position:relative}
  .search-wrap input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;font-size:13px;width:220px;color:var(--text);outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--brand)}
  .search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:15px}
  .btn{display:inline-flex;align-items:center;gap:5px;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif}
  .btn:hover{background:var(--bg)}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn-primary:hover{background:#145230}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-ghost{border-color:transparent;background:transparent}
  .btn-ghost:hover{background:var(--bg)}
  .btn-danger{border-color:#fca5a5;color:var(--red)}
  .btn-danger:hover{background:var(--red-bg)}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text-muted);transition:all .15s}
  .chip.active{background:var(--brand);border-color:var(--brand);color:#fff}
  .chip:hover:not(.active){border-color:var(--brand);color:var(--brand)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
  .ccard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:border-color .2s,box-shadow .2s,transform .15s}
  .ccard:hover{border-color:var(--brand);box-shadow:0 4px 12px rgba(26,92,58,.12);transform:translateY(-1px)}
  .ccard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .ccard-name{font-size:15px;font-weight:600}
  .ccard-meta{font-size:12px;color:var(--text-muted);margin-top:1px}
  .pbar{height:5px;background:#E8EFE8;border-radius:99px;overflow:hidden;margin:6px 0}
  .pfill{height:100%;background:var(--brand-l);border-radius:99px;transition:width .4s ease}
  .pfill.complete{background:var(--brand)}
  .ccard-bottom{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted);margin-top:4px}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
  .b-gray{background:#F1EFE8;color:#5F5E5A}
  .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-green{background:var(--brand-bg);color:var(--brand)}
  .detail-header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .detail-title{font-size:20px;font-weight:600}
  .detail-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
  .progress-main{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .progress-pct{font-size:28px;font-weight:700;color:var(--brand)}
  .pbar-main{height:10px;border-radius:99px;background:var(--grey-bg);overflow:hidden}
  .pfill-main{height:100%;background:linear-gradient(90deg,var(--brand-l),var(--brand));border-radius:99px;transition:width .5s ease}
  .phase-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .phase-title-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .phase-name{font-size:13px;font-weight:600;flex:1}
  .phase-pct{font-size:12px;color:var(--text-muted)}
  .phase-pbar{height:3px;background:var(--grey-bg);border-radius:99px;overflow:hidden;margin-bottom:10px}
  .phase-pfill{height:100%;border-radius:99px;transition:width .4s}
  .ci{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #F0F0F0}
  .ci:last-child{border-bottom:none;padding-bottom:0}
  .ci input[type=checkbox]{width:15px;height:15px;cursor:pointer;margin-top:2px;flex-shrink:0;accent-color:var(--brand)}
  .ci label{font-size:13px;color:var(--text);line-height:1.45;cursor:pointer}
  .ci label.done{color:var(--text-muted);text-decoration:line-through}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
  .modal{background:var(--card);border-radius:14px;padding:1.75rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:1.25rem}
  .fg{margin-bottom:14px}
  .fg label{font-size:12px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:5px}
  .fg input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);background:var(--card);outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
  .fg input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(26,92,58,.1)}
  .modal-actions{display:flex;gap:8px;margin-top:1.25rem}
  .modal-actions .btn{flex:1;justify-content:center}
  .empty{text-align:center;padding:4rem 1rem}
  .empty-icon{font-size:36px;margin-bottom:12px;opacity:.3}
  .empty p{font-size:14px;color:var(--text-muted);margin-bottom:1rem}
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:300;transition:all .3s;display:flex;align-items:center;gap:6px}
  .toast.hidden{opacity:0;transform:translateY(8px);pointer-events:none}
  .toast.success{background:var(--brand)}
  .toast.error{background:var(--red)}
  @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.search-wrap input{width:160px}.topbar h1{display:none}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">O</div>
    <div><h1>Implantação de Pedidos</h1><p>Oca Planejados</p></div>
  </div>
  <div class="sync-badge">
    <div class="sync-dot off" id="dot"></div>
    <span id="sync-txt">Conectando...</span>
  </div>
</div>

<div class="container">
  <div id="lv">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="st-total">—</div></div>
      <div class="stat"><div class="stat-label">Não iniciados</div><div class="stat-value" id="st-new" style="color:#888">—</div></div>
      <div class="stat"><div class="stat-label">Em andamento</div><div class="stat-value" id="st-prog" style="color:var(--amber)">—</div></div>
      <div class="stat"><div class="stat-label">Implantados</div><div class="stat-value" id="st-done" style="color:var(--brand)">—</div></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-wrap"><input id="search" placeholder="Buscar cliente ou pedido..." oninput="renderList()"/></div>
        <div class="filters">
          <span class="chip active" data-f="all" onclick="setFilter('all')">Todos</span>
          <span class="chip" data-f="new" onclick="setFilter('new')">Não iniciados</span>
          <span class="chip" data-f="prog" onclick="setFilter('prog')">Em andamento</span>
          <span class="chip" data-f="done" onclick="setFilter('done')">Implantados</span>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-ghost" onclick="loadData()">↻ Atualizar</button>
        <button class="btn btn-primary" onclick="openModal()">+ Novo pedido</button>
      </div>
    </div>
    <div class="grid" id="grid"><div class="empty"><div class="empty-icon">📋</div><p>Carregando...</p></div></div>
  </div>

  <div id="dv" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <button class="btn btn-ghost" onclick="showList()">← Voltar</button>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="saving-txt" style="font-size:11px;color:var(--text-muted)"></span>
        <button class="btn btn-sm btn-ghost" onclick="loadData()">↻</button>
        <button class="btn btn-sm btn-danger" onclick="delClient()">Excluir</button>
      </div>
    </div>
    <div class="detail-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div><div class="detail-title" id="dname"></div><div class="detail-sub" id="dinfo"></div></div>
        <span id="dbadge"></span>
      </div>
    </div>
    <div class="progress-main">
      <div class="progress-row">
        <span class="progress-pct" id="dpct">0%</span>
        <span style="font-size:13px;color:var(--text-muted)" id="dsub"></span>
      </div>
      <div class="pbar-main"><div class="pfill-main" id="dbar" style="width:0%"></div></div>
    </div>
    <div id="cc"></div>
  </div>
</div>

<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Cadastrar novo pedido</h2>
    <div class="fg"><label>Nome do cliente *</label><input id="fn" placeholder="Ex: João Silva"/></div>
    <div class="fg"><label>Número do pedido</label><input id="fo" placeholder="Ex: 2025-042"/></div>
    <div class="fg"><label>Consultor responsável</label><input id="fc" placeholder="Ex: Ana"/></div>
    <div class="fg"><label>Arquiteto (opcional)</label><input id="fa" placeholder="Ex: Arq. Mariana"/></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveClient()">Cadastrar</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx0NvKHSpxwo7aUlpmDe2bHj552gb5fvwXdQWAL5B_9gkpLcRtflHaGofFt5pOIY9Kr/exec';

const PHASES = [
  {id:'p1',name:'Fase 1 — Recebimento e alinhamento',color:'#1B4F8A',fill:'#E6F1FB',items:[
    {id:'1a',t:'Checklist de passagem de bastão verificado e completo'},
    {id:'1b',t:'Contrato e memorial anexados no sistema'},
    {id:'1c',t:'Contato inicial com cliente e arquiteto realizado'},
    {id:'1d',t:'Etapa da obra confirmada (futura ou imediata)'},
    {id:'1e',t:'Em venda futura: data prevista de medição registrada'},
  ]},
  {id:'p2',name:'Fase 2 — Agendamento e preparação da medição',color:'#1B4F8A',fill:'#E6F1FB',items:[
    {id:'2a',t:'Informações de eletros enviadas ao conferente'},
    {id:'2b',t:'Informações de iluminação enviadas ao conferente'},
    {id:'2c',t:'Observações específicas do projeto repassadas'},
    {id:'2d',t:'Arquivo Promob do consultor enviado ao conferente'},
    {id:'2e',t:'Contrato e memorial enviados ao conferente'},
    {id:'2f',t:'Medição agendada com data, horário e endereço'},
    {id:'2g',t:'Confirmação pós-medição com conferente e cliente'},
    {id:'2h',t:'Etapa atualizada para Conferência no sistema'},
  ]},
  {id:'p3',name:'Fase 3 — Acompanhamento da conferência',color:'#6B3FA0',fill:'#F3EEF9',items:[
    {id:'3a',t:'Acompanhamento da conferência — ponte com todas as partes'},
    {id:'3b',t:'Adições projetuais identificadas e orçadas'},
    {id:'3c',t:'Orçamento das adições aprovado pelo cliente'},
  ]},
  {id:'p4',name:'Fase 4 — Aprovação do caderno técnico',color:'#7B5800',fill:'#FFFAED',items:[
    {id:'4a',t:'Análise primária do caderno técnico realizada'},
    {id:'4b',t:'Caderno enviado ao consultor para aprovação'},
    {id:'4c',t:'Consultor aprovou o caderno'},
    {id:'4d',t:'Caderno enviado ao arquiteto para aprovação e assinatura'},
    {id:'4e',t:'Arquiteto aprovou e assinou'},
    {id:'4f',t:'Caderno enviado ao cliente para aprovação e assinatura'},
    {id:'4g',t:'Cliente aprovou e assinou'},
  ]},
  {id:'p5',name:'Fase 5 — Liberação financeira',color:'#C0392B',fill:'#FDECEA',items:[
    {id:'5a',t:'Arquivo Promob pós-conferência carregado e analisado'},
    {id:'5b',t:'Orçamento final levantado e enviado ao financeiro'},
    {id:'5c',t:'Verificação de aumento de orçamento realizada'},
    {id:'5d',t:'Financeiro liberou o pedido para produção'},
  ]},
  {id:'p6',name:'Fase 6 — Implantação na fábrica',color:'#1A5C3A',fill:'#EAF4EE',items:[
    {id:'6a',t:'Documentação completa reunida (caderno, Promob, orçamento)'},
    {id:'6b',t:'Pedido implantado na fábrica via manager'},
    {id:'6c',t:'Implantação registrada com data e número do pedido'},
    {id:'6d',t:'Executivos enviados ao Supervisor de Operações'},
    {id:'6e',t:'Dúvidas da fábrica respondidas e ajustes feitos'},
  ]}
];

const ALL_IDS = PHASES.flatMap(p=>p.items.map(i=>i.id));
const TOTAL = ALL_IDS.length;
const COLS = ['id','name','order','consultor','arquiteto','created','dle',...ALL_IDS];

let clients = {};
let curId = null;
let saveTimeout = null;
let isSaving = false;
let activeFilter = 'all';

function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type;
  setTimeout(()=>{el.className='toast hidden'},2500);
}

function setSync(state,txt){
  const dot=document.getElementById('dot');
  const stxt=document.getElementById('sync-txt');
  dot.className='sync-dot'+(state==='ok'?'':(state==='saving'?' saving':' off'));
  stxt.textContent=txt;
}

// ── CORE: ler planilha via GET ──────────────────────────────────────────
async function loadData(showToast=false) {
  // Nunca carrega enquanto está salvando — evita race condition
  if(isSaving) return;
  setSync('off','Atualizando...');
  try {
    const r = await fetch(API+'?action=read&t='+Date.now());
    const json = await r.json();

    if(!json.ok) throw new Error(json.error||'resposta inválida');

    const rows = json.data;
    const hasLocalData = Object.keys(clients).length > 0;

    // SEGURANÇA 1: planilha vazia mas temos dados locais — não sobrescreve
    if((!rows || rows.length <= 1) && hasLocalData){
      setSync('ok','Sincronizado');
      if(showToast) toast('Atualizado!');
      return;
    }

    // SEGURANÇA 2: cabeçalho inválido — não sobrescreve
    if(rows && rows.length > 0 && rows[0][0] !== 'id'){
      setSync('ok','Sincronizado');
      return;
    }

    // SEGURANÇA 3: planilha tem menos clientes que local — suspeito, não sobrescreve
    const sheetClientCount = rows ? Math.max(0, rows.length - 1) : 0;
    const localClientCount = Object.keys(clients).length;
    if(sheetClientCount < localClientCount && localClientCount > 0){
      setSync('ok','Sincronizado');
      return;
    }

    if(rows && rows.length > 1){
      const hdr = rows[0];
      const newClients = {};
      for(let i=1;i<rows.length;i++){
        const row=rows[i];
        const id=row[hdr.indexOf('id')];
        if(!id) continue;
        const obj={checks:{},dle:''};
        hdr.forEach((col,ci)=>{
          if(col==='id') return;
          if(col==='dle'){obj.dle=row[ci]||'';return;}
          if(ALL_IDS.includes(col)) obj.checks[col]=row[ci]==='TRUE'||row[ci]===true;
          else obj[col]=row[ci]||'';
        });
        newClients[id]=obj;
      }
      clients=newClients;
    }

    setSync('ok','Sincronizado');
    if(curId && clients[curId]) renderDetail();
    renderList();
    if(showToast) toast('Atualizado!');
  } catch(e){
    setSync('off','Erro de conexão');
  }
}

// ── CORE: gravar planilha via GET com dados na URL ───────────────────────
async function saveAll(){
  if(isSaving) return;
  isSaving=true;
  setSync('saving','Salvando...');
  const st=document.getElementById('saving-txt');
  if(st) st.textContent='Salvando...';

  try {
    const rows=[COLS];
    Object.entries(clients).forEach(([id,c])=>{
      rows.push(COLS.map(col=>{
        if(col==='id') return id;
        if(col==='dle') return c.dle||'';
        if(ALL_IDS.includes(col)) return c.checks&&c.checks[col]?'TRUE':'FALSE';
        return c[col]||'';
      }));
    });

    const encoded = encodeURIComponent(JSON.stringify(rows));
    const url = API+'?action=write&rows='+encoded;
    const r = await fetch(url);
    const json = await r.json();

    if(!json.ok) throw new Error(json.error||'erro ao salvar');

    setSync('ok','Salvo ✓');
    if(st){st.textContent='Salvo ✓';setTimeout(()=>{st.textContent=''},2000);}
  } catch(e){
    // Falhou ao salvar na planilha — mantém dados locais intactos
    setSync('off','Erro ao salvar');
    if(st) st.textContent='Erro ao salvar';
    toast('Não foi possível salvar na planilha. Seus dados locais estão seguros.','error');
  } finally {
    isSaving=false;
  }
}

function getPct(c){
  const n=ALL_IDS.filter(id=>c.checks&&c.checks[id]).length;
  return{n,pct:Math.round((n/TOTAL)*100)};
}

function formatDle(dle){
  if(!dle) return '';
  const [y,m,d]=dle.split('-');
  return `${d}/${m}/${y}`;
}

function dleDaysLeft(dle){
  if(!dle) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const dt=new Date(dle+'T00:00:00');
  return Math.round((dt-today)/(1000*60*60*24));
}

function dleDaysColor(dle){
  const d=dleDaysLeft(dle);
  if(d===null) return 'var(--text-muted)';
  if(d<0) return '#C0392B';
  if(d<=7) return '#C0580B';
  if(d<=14) return '#7B5800';
  return '#1A5C3A';
}

function dleDaysLabel(dle){
  const d=dleDaysLeft(dle);
  if(d===null) return '';
  if(d<0) return `(${Math.abs(d)}d em atraso)`;
  if(d===0) return '(hoje!)';
  if(d===1) return '(amanhã)';
  return `(${d} dias)`;
}

function saveDle(val){
  if(!curId) return;
  clients[curId].dle = val;
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveAll,800);
  renderDetail();
  renderList();
}

function getBadge(pct){
  if(pct===100) return{cls:'b-green',txt:'✓ Implantado'};
  if(pct===0) return{cls:'b-gray',txt:'Não iniciado'};
  return{cls:'b-amber',txt:'Em andamento'};
}

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.f===f));
  renderList();
}

function renderList(){
  const search=(document.getElementById('search').value||'').toLowerCase();
  const all=Object.keys(clients);
  let ids=all.filter(id=>{
    const c=clients[id];const pct=getPct(c).pct;
    if(activeFilter==='new'&&pct!==0) return false;
    if(activeFilter==='prog'&&(pct===0||pct===100)) return false;
    if(activeFilter==='done'&&pct!==100) return false;
    if(search){const h=((c.name||'')+(c.order||'')+(c.consultor||'')).toLowerCase();if(!h.includes(search)) return false;}
    return true;
  });
  document.getElementById('st-total').textContent=all.length;
  document.getElementById('st-new').textContent=all.filter(id=>getPct(clients[id]).pct===0).length;
  document.getElementById('st-prog').textContent=all.filter(id=>{const p=getPct(clients[id]).pct;return p>0&&p<100}).length;
  document.getElementById('st-done').textContent=all.filter(id=>getPct(clients[id]).pct===100).length;
  const grid=document.getElementById('grid');
  if(!ids.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📋</div><p>${all.length===0?'Nenhum pedido cadastrado ainda':'Nenhum resultado'}</p>${all.length===0?'<button class="btn btn-primary" onclick="openModal()">+ Cadastrar primeiro pedido</button>':''}</div>`;
    return;
  }
  grid.innerHTML=ids.map(id=>{
    const c=clients[id];const{n,pct}=getPct(c);const b=getBadge(pct);
    const pd=PHASES.filter(ph=>ph.items.every(i=>c.checks&&c.checks[i.id])).length;
    const dleStr = c.dle ? `<div style="display:flex;align-items:center;gap:4px;margin-top:6px;font-size:12px;font-weight:500;color:${dleDaysColor(c.dle)}">⏱ DLE: ${formatDle(c.dle)} ${dleDaysLabel(c.dle)}</div>` : '';
    return`<div class="ccard" onclick="openClient('${id}')">
      <div class="ccard-top">
        <div><div class="ccard-name">${c.name||'—'}</div><div class="ccard-meta">Pedido ${c.order||'—'} · ${c.consultor||'—'}</div></div>
        <span class="badge ${b.cls}">${b.txt}</span>
      </div>
      <div class="pbar"><div class="pfill ${pct===100?'complete':''}" style="width:${pct}%"></div></div>
      <div class="ccard-bottom"><span>${n} de ${TOTAL} · ${pd}/6 fases</span><span style="font-weight:600;color:${pct===100?'var(--brand)':pct>0?'var(--amber)':'#aaa'}">${pct}%</span></div>
      ${dleStr}
    </div>`;
  }).join('');
}

function openClient(id){
  curId=id;const c=clients[id];
  document.getElementById('dname').textContent=c.name;
  document.getElementById('dinfo').textContent=`Pedido ${c.order||'—'} · Consultor: ${c.consultor||'—'}${c.arquiteto?' · Arq: '+c.arquiteto:''}`;
  renderDetail();
  document.getElementById('lv').style.display='none';
  document.getElementById('dv').style.display='';
  window.scrollTo(0,0);
}

function renderDetail(){
  const c=clients[curId];if(!c) return;
  const{n,pct}=getPct(c);const b=getBadge(pct);
  document.getElementById('dpct').textContent=pct+'%';
  document.getElementById('dbar').style.width=pct+'%';
  document.getElementById('dbadge').innerHTML=`<span class="badge ${b.cls}">${b.txt}</span>`;
  document.getElementById('dsub').textContent=`${n} de ${TOTAL} itens concluídos`;
  const c4gDone = c.checks && c.checks['4g'];
  const dleHtml = `<div class="phase-card" style="border:2px solid ${c.dle?'#1A5C3A':'#E24B4A'};margin-bottom:10px">
    <div class="phase-title-row" style="margin-bottom:10px">
      <span class="badge" style="background:${c.dle?'#EAF4EE':'#FCEBEB'};color:${c.dle?'#1A5C3A':'#C0392B'};font-size:10px">${c.dle?'✓ Preenchida':'⚠ Obrigatória'}</span>
      <span class="phase-name" style="color:#1A5C3A;font-weight:600">🗓 DLE — Data Limite de Entrega</span>
    </div>
    ${!c4gDone?`<p style="font-size:12px;color:var(--text-muted);padding:4px 0 8px">Disponível após o cliente aprovar e assinar o caderno (item 4g).</p>`:`
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <input type="date" id="dle-input" value="${c.dle||''}"
        style="border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:Inter,sans-serif;color:var(--text);background:var(--card);outline:none"
        onchange="saveDle(this.value)" />
      ${c.dle?`<div style="font-size:13px;font-weight:600;color:${dleDaysColor(c.dle)}">⏱ ${dleDaysLabel(c.dle)}</div>`:''}
      ${c.dle?`<button class="btn btn-sm btn-danger" onclick="saveDle('')">Limpar</button>`:''}
    </div>
    ${!c.dle?`<p style="font-size:12px;color:var(--red);margin-top:8px;font-weight:500">⚠ Preencha a DLE antes de avançar para a Fase 5.</p>`:''}
    `}
  </div>`;
  const chk=c.checks||{};
  document.getElementById('cc').innerHTML=PHASES.map((ph,idx)=>{
    const pc=ph.items.filter(i=>chk[i.id]).length;
    const pp=Math.round((pc/ph.items.length)*100);
    const phaseBlock = `<div class="phase-card">
      <div class="phase-title-row">
        <span class="badge" style="background:${ph.fill};color:${ph.color};font-size:10px">${pc}/${ph.items.length}</span>
        <span class="phase-name" style="color:${pc===ph.items.length?ph.color:'var(--text)'}">${ph.name}</span>
        <span class="phase-pct">${pp}%</span>
      </div>
      <div class="phase-pbar"><div class="phase-pfill" style="width:${pp}%;background:${ph.color}"></div></div>
      ${ph.items.map(item=>`<div class="ci">
        <input type="checkbox" id="c${item.id}" ${chk[item.id]?'checked':''} onchange="toggle('${item.id}',this.checked)"/>
        <label for="c${item.id}" class="${chk[item.id]?'done':''}">${item.t}</label>
      </div>`).join('')}
    </div>`;
    // Injeta o bloco de DLE logo após a fase 4
    return phaseBlock + (ph.id==='p4' ? dleHtml : '');
  }).join('');
}

function toggle(itemId,val){
  if(!clients[curId].checks) clients[curId].checks={};
  clients[curId].checks[itemId]=val;
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveAll,1000);
  renderDetail();renderList();
}

function showList(){
  document.getElementById('lv').style.display='';
  document.getElementById('dv').style.display='none';
  curId=null;
}

function openModal(){document.getElementById('modal').style.display='';document.getElementById('fn').focus();}
function closeModal(){document.getElementById('modal').style.display='none';}

async function saveClient(){
  const name=document.getElementById('fn').value.trim();
  if(!name){document.getElementById('fn').focus();toast('Informe o nome do cliente','error');return;}
  const btn=document.getElementById('save-btn');
  btn.textContent='Salvando...';btn.disabled=true;
  const id='c'+Date.now();
  clients[id]={
    name,order:document.getElementById('fo').value.trim(),
    consultor:document.getElementById('fc').value.trim(),
    arquiteto:document.getElementById('fa').value.trim(),
    created:new Date().toISOString(),dle:'',checks:{}
  };
  await saveAll();
  document.getElementById('modal').style.display='none';
  ['fn','fo','fc','fa'].forEach(x=>document.getElementById(x).value='');
  btn.textContent='Cadastrar';btn.disabled=false;
  toast('Pedido cadastrado!');
  renderList();
}

async function delClient(){
  if(!confirm(`Excluir pedido de "${clients[curId].name}"?`)) return;
  const n=clients[curId].name;
  delete clients[curId];
  await saveAll();
  showList();
  toast(`Pedido de ${n} excluído`);
}

// Inicia
loadData();
// Sincroniza a cada 60s (mais conservador para evitar sobrescrever)
setInterval(()=>{if(!isSaving) loadData()},45000);
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});
</script>
</body>
